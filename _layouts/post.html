---
layout: default
---
<article class="blog-post">
	<header>
		<h1>{{ page.title }}</h1>
		<p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
	</header>

	{{ content }}
</article>

<p class="post-backlink"><a href="/blog/">&larr; All posts</a></p>

{% if page.math %}
	<!-- Enabled per post with "math: true" in the frontmatter. -->
	<script>
		MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
	</script>
	<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
{% endif %}
